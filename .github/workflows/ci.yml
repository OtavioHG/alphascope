name: AlphaScope CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt
          pip install -e .
      - name: Lint
        run: |
          python -m compileall src tests
      - name: Test
        run: |
          pytest -q
