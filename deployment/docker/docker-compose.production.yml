version: "3.9"

services:
  alphascope-core:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    command: ["alphascope", "run-production"]
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs

  alphascope-api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    command: ["alphascope", "run-api"]
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  alphascope-dashboard:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    command: ["alphascope", "run-dashboard"]
    env_file:
      - ../../.env
    ports:
      - "8501:8501"
    depends_on:
      - alphascope-api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: alphascope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - alphascope-api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
